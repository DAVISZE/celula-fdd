<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Loading...</title>

<style>
body{
    background:black;
    margin:0;
    height:100vh;
    color:#00ff00;
    font-family:"Courier New", monospace;
}
.texto{
    position:fixed;
    top:15px;
    left:15px;
}
.botao{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    background:black;
    color:#00ff00;
    border:2px solid #00ff00;
    padding:15px 30px;
    font-size:18px;
    cursor:pointer;
}
.botao:hover{
    background:#00ff00;
    color:black;
}
</style>
</head>

<body>

<div class="texto">
    estamos trabalhando em te direcionar...
</div>

<button class="botao" onclick="iniciar()">REDIRECIONAR</button>

<audio id="som" preload="auto">
    <source src="som.mp4" type="audio/mp4">
    <source src="som.mp3" type="audio/mpeg">
</audio>

<script>
function iniciar(){
    const audio = document.getElementById("som");
    audio.currentTime = 0;
    audio.play().then(()=>{
        setTimeout(()=>{
            window.location.href = "https://meet.google.com/tcv-yzuj-tum";
        },5000);
    }).catch((e)=>{
        alert("Erro ao tocar o som 😅");
        console.log(e);
    });
}
</script>

</body>
</html>
