<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Iniciar</title>

<style>
body{
    background:black;
    margin:0;
    height:100vh;
    color:#00ff00;
    font-family:"Courier New", monospace;
}

/* BOTÃO INICIAL CENTRALIZADO */
#startScreen{
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

/* CONTEÚDO ESCONDIDO */
#conteudo{
    display:none;
}

.texto{
    position:fixed;
    top:15px;
    left:15px;
}

.botao{
    background:black;
    color:#00ff00;
    border:3px solid #00ff00;
    padding:20px 40px;
    font-size:22px;
    cursor:pointer;
}

.botao:hover{
    background:#00ff00;
    color:black;
}
</style>
</head>

<body>

<!-- TELA INICIAL -->
<div id="startScreen">
    <button class="botao" onclick="iniciarSistema()">INICIAR</button>
</div>

<!-- CONTEÚDO APÓS CLICAR -->
<div id="conteudo">
    <div class="texto">
        estamos trabalhando em te direcionar...
    </div>
    <audio id="som" src="./som.mp3"></audio>
</div>

<script>
function iniciarSistema(){

    // Esconde tela inicial
    document.getElementById("startScreen").style.display = "none";

    // Mostra conteúdo
    document.getElementById("conteudo").style.display = "block";

    // Toca som
    const audio = document.getElementById("som");
    audio.play();

    // Redireciona após 5 segundos
    setTimeout(function(){
        window.location.href = "https://meet.google.com/tcv-yzuj-tum";
    }, 5000);
}
</script>

</body>
</html>
