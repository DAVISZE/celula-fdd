<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Iniciar</title>

<style>
body{
    background:black;
    margin:0;
    height:100vh;
    color:#00ff00;
    font-family:"Courier New", monospace;
}

#startScreen{
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

#conteudo{
    display:none;
}

.texto{
    position:fixed;
    top:15px;
    left:15px;
}

.botao{
    background:black;
    color:#00ff00;
    border:3px solid #00ff00;
    padding:20px 40px;
    font-size:22px;
    cursor:pointer;
}
</style>
</head>

<body>

<div id="startScreen">
    <button class="botao" onclick="iniciarSistema()">INICIAR</button>
</div>

<div id="conteudo">
    <div class="texto">
        estamos trabalhando em te direcionar...
    </div>
    <audio id="som" src="./som.mp3" preload="auto"></audio>
</div>

<script>
function iniciarSistema(){

    document.getElementById("startScreen").style.display = "none";
    document.getElementById("conteudo").style.display = "block";

    const audio = document.getElementById("som");

    audio.addEventListener("canplay", function() {
        audio.currentTime = 10; // começa no segundo 10
        audio.play();
    }, { once: true });

    // força carregar
    audio.load();

    setTimeout(function(){
        window.location.href = "https://meet.google.com/tcv-yzuj-tum";
    }, 5000);
}
</script>

</body>
</html>
