<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Iniciar</title>

<style>
body{
    background:black;
    margin:0;
    height:100vh;
    color:#00ff00;
    font-family:"Courier New", monospace;
    display:flex;
    justify-content:center;
    align-items:center;
}

#conteudo{
    display:none;
}

.texto{
    position:fixed;
    top:15px;
    left:15px;
}

.botao{
    background:black;
    color:#00ff00;
    border:2px solid #00ff00;
    padding:15px 30px;
    font-size:18px;
    cursor:pointer;
}

.botao:hover{
    background:#00ff00;
    color:black;
}
</style>
</head>

<body>

<!-- BOTÃO INICIAL -->
<button class="botao" onclick="iniciarSistema()">INICIAR</button>

<!-- CONTEÚDO ESCONDIDO -->
<div id="conteudo">
    <div class="texto">
        estamos trabalhando em te direcionar...
    </div>

    <audio id="som" src="./som.mp3"></audio>
</div>

<script>
function iniciarSistema(){

    // Esconde botão
    document.querySelector("button").style.display = "none";

    // Mostra conteúdo
    document.getElementById("conteudo").style.display = "block";

    // Toca som
    const audio = document.getElementById("som");
    audio.play();

    // Redireciona depois de 5s
    setTimeout(function(){
        window.location.href = "https://meet.google.com/tcv-yzuj-tum";
    }, 5000);
}
</script>

</body>
</html>
